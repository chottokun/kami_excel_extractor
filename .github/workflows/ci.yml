name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        env:
          # LLM API 不要なモックテストのみ実行
          LLM_MODEL: "gemini/gemini-2.0-flash"
          LLM_RPM_LIMIT: "10"
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_litellm.py \
            -v \
            --tb=short
