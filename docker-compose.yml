services:
  pipeline-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pipeline-worker-lib
    image: kami-worker:lib
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./run_test.py:/app/run_test.py
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src # パッケージを読み込めるように設定
      - PYTHONUNBUFFERED=1
    command: ["uv", "run", "python", "/app/src/main.py"]
    restart: unless-stopped
