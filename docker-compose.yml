services:
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm-proxy-v3
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/tmp/config.yaml # マウント先を/tmpに変更
    env_file:
      - .env
    environment:
      - LITELLM_MASTER_KEY=sk-1234
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: ["--config", "/tmp/config.yaml", "--port", "4000", "--detailed_debug"] # パスを明示
    restart: always

  pipeline-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pipeline-worker-v3
    image: kami-worker:v3
    volumes:
      - ./src:/app/src
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
      - ./templates:/app/templates
    env_file:
      - .env
    environment:
      - LITELLM_PROXY_URL=http://litellm-proxy:4000
      - PYTHONUNBUFFERED=1
    depends_on:
      - litellm-proxy
    restart: unless-stopped
