services:
  pipeline-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pipeline-worker-final
    image: kami-worker:final
    volumes:
      - ./src:/app/src
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
      - ./templates:/app/templates
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
