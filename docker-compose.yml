# Kami Excel Extractor - Production Ready Compose
services:
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      # マウント先を /app 直下以外にすることで干渉を避ける
      - ./litellm-config.yaml:/etc/litellm/config.yaml:ro
    env_file:
      - .env
    environment:
      # LITELLM_CONFIG_PATH を使うのが最も確実な指定方法
      - LITELLM_CONFIG_PATH=/etc/litellm/config.yaml
      - LITELLM_MASTER_KEY=sk-1234
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    # 起動時のインストール遅延を考慮し、常に再起動を許可
    restart: always

  pipeline-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pipeline-worker
    image: kami-worker:latest
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
    env_file:
      - .env
    environment:
      - LITELLM_PROXY_URL=http://litellm-proxy:4000
      - PYTHONUNBUFFERED=1
    depends_on:
      - litellm-proxy
    restart: unless-stopped
