# Ruff configuration file
line-length = 120
target-version = "py313"

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E402", # Module level import not at top of file (common in scripts modifying sys.path)
    "E701", # Multiple statements on one line (colon) - used frequently in this codebase
    "E501", # Line too long
]

[lint.per-file-ignores]
"tests/*" = ["F401", "F841", "I001"] # Allow unused imports, variables, and un-sorted imports in tests
"run_*.py" = ["F401", "F841", "E402"]
"src/run_*.py" = ["E402"]
